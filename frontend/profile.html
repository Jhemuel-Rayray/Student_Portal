<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — Student Portal</title>
  <meta name="description" content="View and manage your student profile and personal information." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="img/logo.png" alt="Neo-Zenith Logo" class="sidebar-logo-icon" style="background: transparent !important; box-shadow: none !important; border-radius: 0 !important; object-fit: contain;" />
        <div class="sidebar-logo-text">Neo-Zenith <span>Institute</span></div>
      </div>
      <nav class="sidebar-nav">
        <span class="nav-section-label">Navigation</span>
        <a href="dashboard.html" class="nav-item"><i class="fa fa-gauge nav-icon"></i><span class="nav-label">Dashboard</span></a>
        <a href="grades.html" class="nav-item"><i class="fa fa-star nav-icon"></i><span class="nav-label">Grades</span></a>
        <a href="schedule.html" class="nav-item"><i class="fa fa-calendar-days nav-icon"></i><span class="nav-label">Schedule</span></a>
        <a href="announcements.html" class="nav-item"><i class="fa fa-bell nav-icon"></i><span class="nav-label">Announcements</span></a>
        <span class="nav-section-label">Faculty</span>
        <a href="profile.html" class="nav-item active"><i class="fa fa-id-card nav-icon"></i><span class="nav-label">My Profile</span></a>
        <a href="admin.html" class="nav-item"><i class="fa fa-shield-halved nav-icon"></i><span class="nav-label">Faculty Panel</span></a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" onclick="logout()">
          <div class="sidebar-avatar" id="sidebarAvatar">?</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="sidebarUsername">Loading...</div>
            <div class="sidebar-user-role" id="sidebarRole">Student</div>
          </div>
          <i class="fa fa-right-from-bracket text-muted" style="font-size:14px"></i>
        </div>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <div class="flex items-center gap-12">
          <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
          <div class="topbar-left">
            <div class="topbar-title">My Profile</div>
            <div class="topbar-breadcrumb">Student Information Card</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="topbar-btn"><i class="fa fa-bell"></i><span class="notif-dot"></span></div>
        </div>
      </header>

      <main class="page-content">
        <!-- ID Card -->
        <div class="profile-id-card fade-in" id="profileIdCard">
          <div style="display:flex;align-items:center;justify-content:center">
            <div class="spinner"></div>
          </div>
        </div>

        <!-- Details Grid -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px" class="profile-grid">
          <!-- Contact Info -->
          <div class="glass-card fade-in" style="animation-delay:0.15s">
            <div class="card-header">
              <div class="card-title">
                <div class="card-title-icon" style="background:rgba(0,212,255,0.12);color:var(--neon-blue)">📞</div>
                Contact Information
              </div>
            </div>
            <div class="card-body" id="contactInfoBody">
              <div class="empty-state"><div class="spinner"></div></div>
            </div>
          </div>

          <!-- Academic Info -->
          <div class="glass-card fade-in" style="animation-delay:0.25s">
            <div class="card-header">
              <div class="card-title">
                <div class="card-title-icon" style="background:rgba(6,255,212,0.12);color:var(--neon-cyan)">🏫</div>
                Academic Information
              </div>
            </div>
            <div class="card-body" id="academicInfoBody">
              <div class="empty-state"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/support-widget.js"></script>
</body>
</html>
